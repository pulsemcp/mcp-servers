name: Publish to MCP Registry

# Reconciles every server.json against the official MCP Registry and
# publishes any whose version is ahead of (or absent from) the registry.
#
# Eligibility is controlled by the "MCP Registry" column on the root README.
# Servers with "Yes" are eligible; servers with "No" are skipped. Servers
# whose row is missing the column entirely cause the workflow to fail loudly
# so we don't accidentally publish or accidentally skip.
#
# The workflow is idempotent — re-runs are safe. A missed publish (e.g.
# because the secret was misconfigured) can be retried by re-running the
# workflow via workflow_dispatch without any source changes.

on:
  push:
    branches:
      - main
    paths:
      - 'experimental/*/server.json'
      - 'productionized/*/server.json'
      - 'README.md'
      - '.github/workflows/publish-mcp-registry.yml'
      - '.github/scripts/mcp-registry-scan.mjs'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Detect candidates but do not publish'
        type: boolean
        default: false

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: self-hosted
    permissions:
      contents: read

    env:
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help | head -1

      - name: Scan for publishable servers
        id: scan
        run: |
          set -euo pipefail
          node .github/scripts/mcp-registry-scan.mjs > /tmp/scan.json
          COUNT=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/scan.json','utf8')).candidates.length")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "## MCP Registry Publish Sweep"
            echo ""
            node -e '
              const r = JSON.parse(require("fs").readFileSync("/tmp/scan.json","utf8"));
              console.log(`**Candidates:** ${r.candidates.length}`);
              for (const c of r.candidates) {
                console.log(`- ${c.name}@${c.version} (registry has ${c.registryVersion ?? "nothing"}) — \`${c.dir}\``);
              }
              if (r.skipped.length) {
                console.log("");
                console.log(`**Skipped:** ${r.skipped.length}`);
                for (const s of r.skipped) console.log(`- ${s.name}@${s.version}: ${s.reason}`);
              }
              if (r.warnings && r.warnings.length) {
                console.log("");
                console.log(`**Warnings (skipped, did not block the run):** ${r.warnings.length}`);
                for (const w of r.warnings) console.log(`- ${w.dir}: ${w.reason}`);
              }
              if (r.errors.length) {
                console.log("");
                console.log(`**Errors:** ${r.errors.length}`);
                for (const e of r.errors) console.log(`- ${e.dir}: ${e.reason}`);
              }
            '
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate to MCP Registry
        if: steps.scan.outputs.count != '0' && env.DRY_RUN != 'true'
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MCP_PRIVATE_KEY:-}" ]; then
            echo "::error::MCP_REGISTRY_PRIVATE_KEY secret is not set."
            exit 1
          fi
          ./mcp-publisher login dns \
            --domain pulsemcp.com \
            --private-key "$MCP_PRIVATE_KEY"

      - name: Validate pinned npm mcpName values
        if: steps.scan.outputs.count != '0'
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const scan = JSON.parse(fs.readFileSync('/tmp/scan.json', 'utf8'));
          const failures = [];

          function oneLine(value) {
            return String(value).replace(/\s+/g, ' ').trim();
          }

          function workflowCommandValue(value) {
            return oneLine(value).replace(/%/g, '%25').replace(/\r/g, '%0D').replace(/\n/g, '%0A');
          }

          function npmViewMcpName(identifier, version, registryBaseUrl) {
            const spec = `${identifier}@${version}`;
            const args = ['view', spec, 'mcpName', '--json'];
            if (registryBaseUrl) args.push('--registry', registryBaseUrl);
            try {
              const output = execFileSync('npm', args, {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'pipe'],
              }).trim();

              if (!output) return null;
              const parsed = JSON.parse(output);
              return typeof parsed === 'string' && parsed.length > 0 ? parsed : null;
            } catch (error) {
              const stderr = error.stderr ? String(error.stderr).trim() : '';
              throw new Error(stderr || error.message);
            }
          }

          for (const candidate of scan.candidates) {
            const manifest = JSON.parse(fs.readFileSync(candidate.sjPath, 'utf8'));
            const expected = manifest.name;
            const pkg = manifest.packages?.[0];
            const identifier = pkg?.identifier;
            const version = pkg?.version;
            const registryBaseUrl = pkg?.registryBaseUrl;
            const server = `${candidate.name}@${candidate.version}`;

            if (!identifier || !version) {
              failures.push({
                server,
                packageSpec: identifier && version ? `${identifier}@${version}` : '(missing packages[0].identifier or packages[0].version)',
                expected,
                actual: 'missing package metadata in server.json',
              });
              continue;
            }

            let actual;
            try {
              actual = npmViewMcpName(identifier, version, registryBaseUrl);
            } catch (error) {
              failures.push({
                server,
                packageSpec: `${identifier}@${version}`,
                expected,
                actual: `npm lookup failed: ${error.message}`,
              });
              continue;
            }

            if (actual !== expected) {
              failures.push({
                server,
                packageSpec: `${identifier}@${version}`,
                expected,
                actual: actual ?? 'missing',
              });
            } else {
              console.log(`✓ ${server}: ${identifier}@${version} mcpName matches ${expected}`);
            }
          }

          if (failures.length > 0) {
            console.error('\nPinned npm package mcpName validation failed.');
            console.error('The MCP Registry validates each server.json name against the exact published npm package version in packages[0].');
            console.error('Republish the npm package with the corrected mcpName, or bump server.json packages[0].version to a version that already has it.\n');

            for (const failure of failures) {
              console.error(`Server: ${failure.server}`);
              console.error(`npm package checked: ${failure.packageSpec}`);
              console.error(`Expected mcpName: ${failure.expected}`);
              console.error(`Actual mcpName: ${failure.actual}`);
              console.error('Remedy: republish this npm package version with the corrected mcpName, or bump server.json to a corrected published version.');
              console.error('');
              console.error(`::error title=Invalid npm mcpName for ${workflowCommandValue(failure.server)}::${workflowCommandValue(failure.packageSpec)} has mcpName ${workflowCommandValue(failure.actual)}; expected ${workflowCommandValue(failure.expected)}. Republish the npm package with the corrected mcpName, or bump server.json to a version that already has it.`);
            }
            process.exit(1);
          }
          NODE

      - name: Publish candidates
        id: publish
        if: steps.scan.outputs.count != '0'
        run: |
          set +e
          PUBLISHED='[]'
          FAILED='[]'
          CANDIDATES=$(node -p "JSON.stringify(JSON.parse(require('fs').readFileSync('/tmp/scan.json','utf8')).candidates)")

          # Iterate with node so we get clean JSON per row
          ROWS=$(node -e '
            const arr = JSON.parse(process.argv[1]);
            for (const c of arr) console.log([c.name, c.version, c.sjPath].join("\t"));
          ' "$CANDIDATES")

          while IFS=$'\t' read -r NAME VERSION SJ_PATH; do
            [ -z "$NAME" ] && continue
            echo ""
            echo "=== Publishing $NAME@$VERSION ($SJ_PATH) ==="

            if [ "$DRY_RUN" = "true" ]; then
              echo "🧪 Dry run — would publish."
              PUBLISHED=$(node -e '
                const arr = JSON.parse(process.argv[1]);
                arr.push({ name: process.argv[2], version: process.argv[3], dryRun: true });
                console.log(JSON.stringify(arr));
              ' "$PUBLISHED" "$NAME" "$VERSION")
              continue
            fi

            if ./mcp-publisher publish "$SJ_PATH"; then
              echo "✅ Published $NAME@$VERSION"
              PUBLISHED=$(node -e '
                const arr = JSON.parse(process.argv[1]);
                arr.push({ name: process.argv[2], version: process.argv[3] });
                console.log(JSON.stringify(arr));
              ' "$PUBLISHED" "$NAME" "$VERSION")
            else
              echo "::error::Failed to publish $NAME@$VERSION"
              FAILED=$(node -e '
                const arr = JSON.parse(process.argv[1]);
                arr.push({ name: process.argv[2], version: process.argv[3] });
                console.log(JSON.stringify(arr));
              ' "$FAILED" "$NAME" "$VERSION")
            fi
          done <<< "$ROWS"

          echo ""
          {
            echo ""
            echo "### Publish Results"
            node -e '
              const ok = JSON.parse(process.argv[1]);
              const bad = JSON.parse(process.argv[2]);
              if (ok.length) {
                console.log(`✅ Published: ${ok.length}`);
                for (const c of ok) console.log(`- ${c.name}@${c.version}${c.dryRun ? " (dry run)" : ""}`);
              }
              if (bad.length) {
                console.log(`❌ Failed: ${bad.length}`);
                for (const c of bad) console.log(`- ${c.name}@${c.version}`);
              }
            ' "$PUBLISHED" "$FAILED"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED_COUNT=$(node -p "JSON.parse(process.argv[1]).length" "$FAILED")
          if [ "$FAILED_COUNT" -gt 0 ]; then
            exit 1
          fi
