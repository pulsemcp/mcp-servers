name: Publish to MCP Registry

# Reconciles every server.json against the official MCP Registry and
# publishes any whose version is ahead of (or absent from) the registry.
#
# Eligibility is controlled by the "MCP Registry" column on the root README.
# Servers with "Yes" are eligible; servers with "No" are skipped. Servers
# whose row is missing the column entirely cause the workflow to fail loudly
# so we don't accidentally publish or accidentally skip.
#
# The workflow is idempotent — re-runs are safe. A missed publish (e.g.
# because the secret was misconfigured) can be retried by re-running the
# workflow via workflow_dispatch without any source changes.

on:
  push:
    branches:
      - main
    paths:
      - 'experimental/*/server.json'
      - 'productionized/*/server.json'
      - 'README.md'
      - '.github/workflows/publish-mcp-registry.yml'
      - '.github/scripts/mcp-registry-scan.mjs'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Detect candidates but do not publish'
        type: boolean
        default: false

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: self-hosted
    permissions:
      contents: read

    env:
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help | head -1

      - name: Scan for publishable servers
        id: scan
        run: |
          set -euo pipefail
          node .github/scripts/mcp-registry-scan.mjs > /tmp/scan.json
          COUNT=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/scan.json','utf8')).candidates.length")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "## MCP Registry Publish Sweep"
            echo ""
            node -e '
              const r = JSON.parse(require("fs").readFileSync("/tmp/scan.json","utf8"));
              console.log(`**Candidates:** ${r.candidates.length}`);
              for (const c of r.candidates) {
                console.log(`- ${c.name}@${c.version} (registry has ${c.registryVersion ?? "nothing"}) — \`${c.dir}\``);
              }
              if (r.skipped.length) {
                console.log("");
                console.log(`**Skipped:** ${r.skipped.length}`);
                for (const s of r.skipped) console.log(`- ${s.name}@${s.version}: ${s.reason}`);
              }
              if (r.errors.length) {
                console.log("");
                console.log(`**Errors:** ${r.errors.length}`);
                for (const e of r.errors) console.log(`- ${e.dir}: ${e.reason}`);
              }
            '
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate to MCP Registry
        if: steps.scan.outputs.count != '0' && env.DRY_RUN != 'true'
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MCP_PRIVATE_KEY:-}" ]; then
            echo "::error::MCP_REGISTRY_PRIVATE_KEY secret is not set."
            exit 1
          fi
          ./mcp-publisher login dns \
            --domain pulsemcp.com \
            --private-key "$MCP_PRIVATE_KEY"

      - name: Publish candidates
        id: publish
        if: steps.scan.outputs.count != '0'
        run: |
          set +e
          PUBLISHED='[]'
          FAILED='[]'
          CANDIDATES=$(node -p "JSON.stringify(JSON.parse(require('fs').readFileSync('/tmp/scan.json','utf8')).candidates)")

          # Iterate with node so we get clean JSON per row
          ROWS=$(node -e '
            const arr = JSON.parse(process.argv[1]);
            for (const c of arr) console.log([c.name, c.version, c.sjPath].join("\t"));
          ' "$CANDIDATES")

          while IFS=$'\t' read -r NAME VERSION SJ_PATH; do
            [ -z "$NAME" ] && continue
            echo ""
            echo "=== Publishing $NAME@$VERSION ($SJ_PATH) ==="

            if [ "$DRY_RUN" = "true" ]; then
              echo "🧪 Dry run — would publish."
              PUBLISHED=$(node -e '
                const arr = JSON.parse(process.argv[1]);
                arr.push({ name: process.argv[2], version: process.argv[3], dryRun: true });
                console.log(JSON.stringify(arr));
              ' "$PUBLISHED" "$NAME" "$VERSION")
              continue
            fi

            if ./mcp-publisher publish "$SJ_PATH"; then
              echo "✅ Published $NAME@$VERSION"
              PUBLISHED=$(node -e '
                const arr = JSON.parse(process.argv[1]);
                arr.push({ name: process.argv[2], version: process.argv[3] });
                console.log(JSON.stringify(arr));
              ' "$PUBLISHED" "$NAME" "$VERSION")
            else
              echo "::error::Failed to publish $NAME@$VERSION"
              FAILED=$(node -e '
                const arr = JSON.parse(process.argv[1]);
                arr.push({ name: process.argv[2], version: process.argv[3] });
                console.log(JSON.stringify(arr));
              ' "$FAILED" "$NAME" "$VERSION")
            fi
          done <<< "$ROWS"

          echo ""
          {
            echo ""
            echo "### Publish Results"
            node -e '
              const ok = JSON.parse(process.argv[1]);
              const bad = JSON.parse(process.argv[2]);
              if (ok.length) {
                console.log(`✅ Published: ${ok.length}`);
                for (const c of ok) console.log(`- ${c.name}@${c.version}${c.dryRun ? " (dry run)" : ""}`);
              }
              if (bad.length) {
                console.log(`❌ Failed: ${bad.length}`);
                for (const c of bad) console.log(`- ${c.name}@${c.version}`);
              }
            ' "$PUBLISHED" "$FAILED"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED_COUNT=$(node -p "JSON.parse(process.argv[1]).length" "$FAILED")
          if [ "$FAILED_COUNT" -gt 0 ]; then
            exit 1
          fi
