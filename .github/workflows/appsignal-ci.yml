name: AppSignal MCP Server CI

on:
  push:
    branches:
      - main
    paths:
      - 'experimental/appsignal/**'
      - '.github/workflows/appsignal-ci.yml'
  pull_request:
    paths:
      - 'experimental/appsignal/**'
      - '.github/workflows/appsignal-ci.yml'

jobs:
  functional-tests:
    name: AppSignal MCP Server Functional Tests
    runs-on: self-hosted
    timeout-minutes: 15

    defaults:
      run:
        working-directory: experimental/appsignal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run install-all

      - name: Build project
        run: npm run build

      - name: Run functional tests
        run: npm run test:run
        env:
          APPSIGNAL_API_KEY: test-api-key
          APPSIGNAL_APP_ID: test-app-id

  integration-tests:
    name: AppSignal MCP Server Integration Tests
    runs-on: self-hosted
    timeout-minutes: 15

    defaults:
      run:
        working-directory: experimental/appsignal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run ci:install

      - name: Run integration tests
        run: npm run test:integration
        env:
          APPSIGNAL_API_KEY: test-api-key
          APPSIGNAL_APP_ID: test-app-id
