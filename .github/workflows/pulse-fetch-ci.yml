name: Pulse Fetch MCP Server CI

on:
  push:
    branches:
      - main
    paths:
      - 'productionized/pulse-fetch/**'
      - '.github/workflows/pulse-fetch-ci.yml'
  pull_request:
    paths:
      - 'productionized/pulse-fetch/**'
      - '.github/workflows/pulse-fetch-ci.yml'

jobs:
  functional-tests:
    name: Pulse Fetch MCP Server Functional Tests
    runs-on: self-hosted

    defaults:
      run:
        working-directory: productionized/pulse-fetch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run install-all

      - name: Build project
        run: npm run build

      - name: Run functional tests
        run: npm run test:run
        env:
          FIRECRAWL_API_KEY: test-api-key
          BRIGHTDATA_API_KEY: test-api-key

  integration-tests:
    name: Pulse Fetch MCP Server Integration Tests
    runs-on: self-hosted

    defaults:
      run:
        working-directory: productionized/pulse-fetch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run ci:install

      - name: Run integration tests
        run: npm run test:integration
        env:
          FIRECRAWL_API_KEY: test-api-key
          BRIGHTDATA_API_KEY: test-api-key
