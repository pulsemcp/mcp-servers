name: Twist MCP Server CI

on:
  push:
    branches:
      - main
    paths:
      - 'experimental/twist/**'
      - '.github/workflows/twist-ci.yml'
  pull_request:
    paths:
      - 'experimental/twist/**'
      - '.github/workflows/twist-ci.yml'

jobs:
  functional-tests:
    name: Twist MCP Server Functional Tests
    runs-on: self-hosted

    defaults:
      run:
        working-directory: experimental/twist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run install-all

      - name: Build project
        run: npm run build

      - name: Run functional tests
        run: npm run test:run
        env:
          TWIST_BEARER_TOKEN: test-token
          TWIST_WORKSPACE_ID: test-workspace

  integration-tests:
    name: Twist MCP Server Integration Tests
    runs-on: self-hosted

    defaults:
      run:
        working-directory: experimental/twist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run ci:install

      - name: Run integration tests
        run: npm run test:integration
        env:
          TWIST_BEARER_TOKEN: test-token
          TWIST_WORKSPACE_ID: test-workspace
