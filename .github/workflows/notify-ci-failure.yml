name: Notify CI Failures

on:
  workflow_run:
    workflows:
      - 'Lint and Format Check'
      - 'CI Build & Test Checks'
      - 'AppSignal MCP Server CI'
      - 'Claude Code Agent MCP Server CI'
      - 'GCS MCP Server CI'
      - 'Hatchbox MCP Server CI'
      - 'Pulse Fetch MCP Server CI'
      - 'Slack MCP Server CI'
      - 'Twist MCP Server CI'
    types: [completed]
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Notify Slack of CI failure
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          CHANNEL_ID="C0A62DG97HD"

          if [ -n "$SLACK_BOT_TOKEN" ]; then
            curl -sf -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"channel\":\"${CHANNEL_ID}\",\"text\":\":red_circle: *CI failure on pulsemcp/mcp-servers (main)*\n\nWorkflow: ${WORKFLOW_NAME}\n<${RUN_URL}|View failed run>\n\nThis repo is a distribution surface — fixes should be applied to the internal source of truth in pulsemcp/pulsemcp under mcp-servers/.\"}" || true
          else
            echo "SLACK_BOT_TOKEN not available — skipping notification"
          fi
