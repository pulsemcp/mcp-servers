name: GCS MCP Server CI

on:
  push:
    branches:
      - main
    paths:
      - 'experimental/gcs/**'
      - '.github/workflows/gcs-ci.yml'
  pull_request:
    paths:
      - 'experimental/gcs/**'
      - '.github/workflows/gcs-ci.yml'

jobs:
  functional-tests:
    name: GCS MCP Server Functional Tests
    runs-on: self-hosted
    timeout-minutes: 15

    defaults:
      run:
        working-directory: experimental/gcs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run install-all

      - name: Build project
        run: npm run build

      - name: Run functional tests
        run: npm run test:run

  integration-tests:
    name: GCS MCP Server Integration Tests
    runs-on: self-hosted
    timeout-minutes: 15

    defaults:
      run:
        working-directory: experimental/gcs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install server dependencies
        run: npm run ci:install

      - name: Run integration tests
        run: npm run test:integration
