name: Lint and Format Check

on:
  push:
    branches:
      - main
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - '.eslintrc.json'
      - '.prettierrc.json'
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - '.eslintrc.json'
      - '.prettierrc.json'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # Redirect npm's cache to the per-job RUNNER_TEMP dir so concurrent
      # installs on the shared self-hosted runner can't collide in the default
      # ~/.npm/_cacache (flaky _cacache/tmp EEXIST, errno -17). Set via
      # GITHUB_ENV so it applies to every later npm step in the job.
      - name: Isolate npm cache
        run: echo "npm_config_cache=$RUNNER_TEMP/.npm-cache" >> "$GITHUB_ENV"

      - name: Install root dependencies
        run: npm ci

      - name: Lint all code
        run: npm run lint
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Check formatting
        run: npm run format:check
